name: "Contributor Onboarding & Triage"

on:
  issues:
    types: [opened]
  workflow_dispatch:

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: "First Interaction Triage"
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          # Logic: Executes only if this is the user's first issue in nirvik34/gitbun
          issue-message: |
            ##  Welcome to Gitbun! 
            @${{ github.actor }}, thank you for opening this issue. We appreciate you helping us improve!

            **Quick Checklist:**
            - [ ] Have you checked if a similar [issue](https://github.com/nirvik34/gitbun/issues) already exists?
            - [ ] Have you read our [Contributing Guidelines](https://github.com/nirvik34/gitbun/blob/main/CONTRIBUTING.md)?
            
            A maintainer will review your report shortly. In the meantime, ensure your description provides enough context for us to help you!
          

      - name: "Add Triage Label"
        uses: actions/github-script@v6
        with:
          script: |
            const response = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: context.payload.issue.user.login,
              state: 'all',
              per_page: 2 // We only need to know if they have more than 1
            });

            if (response.data.length <= 1) {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: ['triage']
              });
            }
